version: "3.9"

services:
  backend:
    build: .
    container_name: homebuddy_be
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg2://user:password@db:5432/homebuddy
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    networks:
      - app_network

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: homebuddy
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - ../postgres-data:/var/lib/postgresql/data # 🔥 bind mount
    networks:
      - app_network

networks:
  app_network:
